<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GCP Analytics Lab · Valesca Bravo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --navy:#1d085e; --teal:#13d6c1; --teal-dark:#0a9a88;
  --bg:#09071a; --bg2:#0f0c2a; --bg3:#161235;
  --text:#e8e6f0; --muted:#8b87a8; --border:#2a2550;
  --kw:#4ec9b0; --str:#ce9178; --cmt:#6a9955; --flag:#fb923c; --var:#c792ea;
  --cloud-run:#34d399; --cloud-fn:#a78bfa; --gke:#60a5fa; --ce:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(19,214,193,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(29,8,94,.4) 0%,transparent 60%);pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
code,pre,.mono{font-family:'DM Mono',monospace}
.tab-active{border-bottom:2px solid var(--teal);color:var(--teal)}
.tab-inactive{border-bottom:2px solid transparent;color:var(--muted)}
.tab-inactive:hover{color:var(--text);border-color:var(--border)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.card-glow{box-shadow:0 0 0 1px var(--border),0 4px 32px rgba(19,214,193,.06)}
.badge{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .75rem;border-radius:999px;font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.badge-teal{background:rgba(19,214,193,.12);color:var(--teal);border:1px solid rgba(19,214,193,.25)}
.badge-navy{background:rgba(29,8,94,.5);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.badge-orange{background:rgba(251,146,60,.12);color:var(--flag);border:1px solid rgba(251,146,60,.25)}
pre.code-block{background:#0d0b1e;border:1px solid var(--border);border-radius:8px;padding:1rem;overflow-x:auto;font-size:.8rem;line-height:1.7}
.kw{color:var(--kw)} .str{color:var(--str)} .cmt{color:var(--cmt)} .flag{color:var(--flag)} .var{color:var(--var)} .num{color:#b5cea8}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.section-title{font-size:1.1rem;font-weight:700;color:var(--teal);margin-bottom:.75rem;letter-spacing:-.01em}
.error-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:.85rem;margin-top:.75rem}
.tip-box{background:rgba(19,214,193,.07);border:1px solid rgba(19,214,193,.2);border-radius:8px;padding:.85rem;margin-top:.75rem}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--border);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--teal);cursor:pointer}
.quiz-opt{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;cursor:pointer;text-align:left;width:100%;color:var(--text);font-family:'Sora',sans-serif;font-size:.85rem;transition:border-color .2s}
.quiz-opt:hover{border-color:var(--teal)}
.quiz-correct{border-color:#34d399;background:rgba(52,211,153,.08);color:#34d399}
.quiz-wrong{border-color:#f87171;background:rgba(248,113,113,.08);color:#f87171}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease both}
@keyframes dash{to{stroke-dashoffset:0}}
.flow-arrow{stroke-dasharray:200;stroke-dashoffset:200;animation:dash 1.8s ease forwards}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef} = React;

/* ── helpers ── */
const cx=(...c)=>c.filter(Boolean).join(' ');

/* ── syntax highlight ── */
function Code({lang='sql',children}){
  let html=children.trim();
  if(lang==='sql'){
    html=html
      .replace(/--[^\n]*/g,m=>`<span class="cmt">${m}</span>`)
      .replace(/\b(SELECT|FROM|WHERE|GROUP BY|ORDER BY|LIMIT|WITH|AS|ON|JOIN|LEFT|INNER|HAVING|PARTITION BY|CLUSTER BY|CREATE|TABLE|REPLACE|INSERT|UPDATE|DELETE|UNNEST|STRUCT|ARRAY|IF|THEN|ELSE|END|CASE|WHEN|AND|OR|NOT|IN|IS|NULL|TRUE|FALSE|BY|OVER|BETWEEN)\b/g,m=>`<span class="kw">${m}</span>`)
      .replace(/'([^']*)'/g,(_,v)=>`<span class="str">'${v}'</span>`)
      .replace(/\b(\d+(\.\d+)?)\b/g,m=>`<span class="num">${m}</span>`);
  }else if(lang==='gcloud'){
    html=html
      .replace(/#[^\n]*/g,m=>`<span class="cmt">${m}</span>`)
      .replace(/(--[\w-]+=?)/g,m=>`<span class="flag">${m}</span>`)
      .replace(/\b(gcloud|bq|gsutil)\b/g,m=>`<span class="kw">${m}</span>`)
      .replace(/'([^']*)'/g,(_,v)=>`<span class="str">'${v}'</span>`);
  }
  return <pre className="code-block"><code dangerouslySetInnerHTML={{__html:html}}/></pre>;
}

/* ── TABS config ── */
const TABS=[
  {id:'fund',  label:'Fundamentos GCP'},
  {id:'bq',    label:'BigQuery'},
  {id:'compute',label:'Cómputo'},
  {id:'pipeline',label:'Data Pipeline'},
  {id:'ai',    label:'AI y ML'},
  {id:'storage',label:'Storage'},
  {id:'cases', label:'Casos Reales'},
  {id:'cheat', label:'Cheat Sheet'},
  {id:'compare',label:'Comparativa Cloud'},
  {id:'quiz',  label:'Quiz'},
];

/* ── HERO ── */
function Hero(){
  return(
    <header className="relative px-4 pt-8 pb-6 text-center">
      <div className="flex items-center justify-between max-w-5xl mx-auto mb-6">
        <a href="https://valescabravo.github.io/" className="badge badge-navy text-xs hover:opacity-80 transition-opacity">← Portfolio</a>
        <a href="https://valescabravo.github.io/lab/" className="badge badge-navy text-xs hover:opacity-80 transition-opacity">← Back to the Lab</a>
        <span className="badge badge-teal">2026</span>
      </div>
      <div className="max-w-3xl mx-auto">
        <p className="mono text-xs text-teal mb-2 tracking-widest" style={{color:'var(--teal)'}}>INTERACTIVE LAB</p>
        <h1 className="text-3xl md:text-5xl font-bold mb-3" style={{letterSpacing:'-.03em'}}>
          Google Cloud Platform<br/>
          <span style={{color:'var(--teal)'}}>Analytics Lab</span>
        </h1>
        <p className="text-sm md:text-base leading-relaxed max-w-xl mx-auto" style={{color:'var(--muted)'}}>
          BigQuery, Data Pipelines, Vertex AI y el ecosistema de marketing de Google — desde analogías cotidianas hasta arquitecturas de producción.
        </p>
      </div>
    </header>
  );
}

/* ── NAV TABS ── */
function TabNav({active,onSelect}){
  const ref=useRef(null);
  return(
    <nav className="sticky top-0 z-20 px-2" style={{background:'rgba(9,7,26,.92)',backdropFilter:'blur(12px)',borderBottom:'1px solid var(--border)'}}>
      <div ref={ref} className="flex gap-1 max-w-5xl mx-auto overflow-x-auto scroll-x py-1" style={{scrollbarWidth:'none'}}>
        {TABS.map(t=>(
          <button key={t.id}
            onClick={()=>onSelect(t.id)}
            className={cx('tab-'+(active===t.id?'active':'inactive'),'px-3 py-3 text-xs font-semibold whitespace-nowrap transition-all')}
          >{t.label}</button>
        ))}
      </div>
    </nav>
  );
}

/* ── PLACEHOLDER PANELS ── */
/* ── TAB: FUNDAMENTOS GCP ── */
function TabFund(){
  const [open,setOpen]=useState(null);
  const toggle=k=>setOpen(o=>o===k?null:k);
  const sections=[
    {key:'hier',title:'Jerarquía de recursos',badge:'Modelo de recursos',
     analogy:'Piensa en Google Cloud como una empresa real: la Organización es la empresa, las Carpetas son departamentos (Marketing, Ingeniería), y los Proyectos son los equipos de trabajo. Cada equipo tiene su presupuesto propio (Billing Account).',
     detail:<>
      <p className="text-sm leading-relaxed mb-3" style={{color:'var(--muted)'}}>La jerarquía define cómo se heredan los permisos hacia abajo: un rol asignado a nivel Organización se hereda por todas las Carpetas y Proyectos.</p>
      <Code lang="gcloud">{`# Listar proyectos disponibles
gcloud projects list

# Crear proyecto bajo una carpeta
gcloud projects create my-analytics-proj \\
  --folder=123456789 \\
  --set-as-default

# Ver jerarquía de la organización
gcloud resource-manager folders list \\
  --organization=ORG_ID`}</Code>
      <div className="tip-box text-xs mt-2"><span style={{color:'var(--teal)'}}>Caso real:</span> Separar proyecto <code>ga4-production</code> de <code>ga4-dev</code> evita que una query costosa en pruebas afecte el presupuesto de producción.</div>
      <div className="error-box text-xs"><span style={{color:'#f87171'}}>Error común:</span> Poner todo en un solo proyecto mezcla costos, permisos y entornos. En producción, mínimo 3 proyectos: dev / staging / prod.</div>
     </>
    },
    {key:'iam',title:'IAM: identidades y roles',badge:'Seguridad',
     analogy:'IAM es el portero del edificio. Define quién puede entrar (identidad), a qué piso (recurso) y qué puede hacer allí (rol). Los roles predefinidos son llaves maestras — convenientes, pero peligrosas si caen en manos equivocadas.',
     detail:<>
      <p className="text-sm leading-relaxed mb-3" style={{color:'var(--muted)'}}>AWS equivalente: IAM Roles + Policies. Azure: RBAC. GCP usa un modelo aditivo: los permisos se acumulan, no se resta.</p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
        {[['User Account','Persona real con email Google. Para acceso humano interactivo.','badge-navy'],
          ['Service Account','Identidad para apps y servicios. Tiene clave JSON o Workload Identity.','badge-teal'],
          ['Grupo','Colección de users. Mejor práctica: asignar roles a grupos, no a individuos.','badge-orange'],
          ['Rol Personalizado','Combinación exacta de permisos. Obligatorio en producción.','badge-navy']
        ].map(([t,d,b])=>(
          <div key={t} className="card" style={{padding:'.75rem'}}>
            <span className={cx('badge',b,'mb-2')}>{t}</span>
            <p className="text-xs mt-1" style={{color:'var(--muted)'}}>{d}</p>
          </div>
        ))}
      </div>
      <Code lang="gcloud">{`# Asignar rol a Service Account (principio mínimo privilegio)
gcloud projects add-iam-policy-binding my-proj \\
  --member='serviceAccount:sa@my-proj.iam.gserviceaccount.com' \\
  --role='roles/bigquery.dataViewer'

# NUNCA en prod: roles/owner o roles/editor
# Ver roles actuales
gcloud projects get-iam-policy my-proj --format=json`}</Code>
      <div className="error-box text-xs"><span style={{color:'#f87171'}}>Error común:</span> Usar <code>roles/editor</code> en producción da acceso de escritura a todos los servicios. Un script mal escrito puede borrar tablas de BigQuery o exponer datos.</div>
     </>
    },
    {key:'billing',title:'Billing Accounts y presupuestos',badge:'Costos',
     analogy:'La Billing Account es la tarjeta de crédito de tu empresa en GCP. Un proyecto sin Billing Account activo no puede usar servicios de pago — como intentar llamar sin saldo.',
     detail:<>
      <Code lang="gcloud">{`# Listar cuentas de facturación
gcloud billing accounts list

# Vincular proyecto a billing account
gcloud billing projects link my-proj \\
  --billing-account=0X0X0X-0X0X0X-0X0X0X

# Crear alerta de presupuesto (mejor vía Console)
# Budget API también disponible via REST`}</Code>
      <div className="tip-box text-xs"><span style={{color:'var(--teal)'}}>Práctica recomendada:</span> Configurar alertas al 50%, 90% y 100% del presupuesto mensual. GCP no corta servicios automáticamente al llegar al límite — el costo sigue creciendo.</div>
     </>
    },
  ];
  return(
    <div className="space-y-4 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <span className="badge badge-teal">Fundamentos</span>
        <h2 className="text-xl font-bold">Google Cloud Platform — Base conceptual</h2>
      </div>
      <div className="card card-glow mb-6">
        <p className="text-sm leading-relaxed" style={{color:'var(--muted)'}}>GCP organiza todo en una jerarquía de recursos. A diferencia de AWS (donde todo gira en torno a cuentas) o Azure (subscripciones), GCP usa <strong style={{color:'var(--text)'}}>Proyectos</strong> como unidad central de facturación, permisos y servicios.</p>
        <div className="mt-3 grid grid-cols-3 text-center gap-2 text-xs">
          {[['GCP','Proyecto','Billing Account'],['AWS','Account','AWS Account'],['Azure','Resource Group','Subscription']].map(([c,u,b])=>(
            <div key={c} className="card" style={{padding:'.6rem'}}>
              <div className="font-bold mb-1" style={{color:'var(--teal)'}}>{c}</div>
              <div style={{color:'var(--muted)'}}>{u}<br/><span className="mono text-xs">{b}</span></div>
            </div>
          ))}
        </div>
      </div>
      {sections.map(s=>(
        <div key={s.key} className="card card-glow">
          <button className="w-full flex items-center justify-between gap-2" onClick={()=>toggle(s.key)}>
            <div className="flex items-center gap-2"><span className="badge badge-teal">{s.badge}</span><span className="font-semibold text-sm">{s.title}</span></div>
            <span style={{color:'var(--teal)'}}>{open===s.key?'▲':'▼'}</span>
          </button>
          <p className="text-sm mt-3 leading-relaxed" style={{color:'var(--muted)'}}>{s.analogy}</p>
          {open===s.key&&<div className="mt-4 fade-in">{s.detail}</div>}
        </div>
      ))}
    </div>
  );
}

/* ── TAB: BIGQUERY ── */
function TabBQ(){
  const [section,setSection]=useState('arch');
  const nav=[['arch','Arquitectura'],['pricing','Precios'],['ml','BQ ML'],['marketing','GA4 + Ads'],['bi','BI Engine']];
  return(
    <div className="fade-in">
      <div className="flex items-center gap-3 mb-5">
        <span className="badge badge-teal">BigQuery</span>
        <h2 className="text-xl font-bold">El data warehouse serverless de Google</h2>
      </div>
      <div className="flex gap-2 mb-6 flex-wrap">
        {nav.map(([k,l])=>(
          <button key={k} onClick={()=>setSection(k)}
            className={cx('badge',section===k?'badge-teal':'badge-navy','cursor-pointer transition-all')}>
            {l}
          </button>
        ))}
      </div>
      {section==='arch'&&<BQArch/>}
      {section==='pricing'&&<BQPricing/>}
      {section==='ml'&&<BQML/>}
      {section==='marketing'&&<BQMarketing/>}
      {section==='bi'&&<BQBIEngine/>}
    </div>
  );
}

function BQArch(){
  return(
    <div className="space-y-4">
      <div className="card card-glow">
        <p className="section-title">¿Por qué BigQuery es rápido?</p>
        <p className="text-sm leading-relaxed mb-3" style={{color:'var(--muted)'}}>Analogía: imagina un archivo de fichas. Una base de datos tradicional guarda cada ficha completa (fila). BigQuery guarda todas las fichas de "color" juntas, todas las de "precio" juntas — columnas separadas. Cuando preguntas "¿cuál es el precio promedio?", sólo lee la columna de precio, no todo el archivo.</p>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
          {[
            ['Columnar','Lee sólo las columnas necesarias. Una query que toca 2 de 50 columnas lee 4% de los datos.','var(--teal)'],
            ['Dremel Engine','Motor de ejecución distribuido: divide la query en miles de workers en paralelo. Sin configuración de tu parte.','var(--var)'],
            ['Separación storage/compute','Los datos viven en Colossus (storage), el procesamiento ocurre en Borg (compute). Escalan independientemente.','var(--flag)'],
          ].map(([t,d,c])=>(
            <div key={t} className="card" style={{borderColor:`${c}40`,padding:'.85rem'}}>
              <div className="font-bold mb-1" style={{color:c}}>{t}</div>
              <p style={{color:'var(--muted)'}}>{d}</p>
            </div>
          ))}
        </div>
      </div>
      <div className="card card-glow">
        <p className="section-title">Particionado y Clustering</p>
        <p className="text-sm leading-relaxed mb-2" style={{color:'var(--muted)'}}>Particionado = dividir la tabla por fecha. Clustering = ordenar filas dentro de cada partición por columnas frecuentes en WHERE. Juntos pueden reducir datos leídos en 90%+.</p>
        <Code lang="sql">{`-- Tabla particionada por día con clustering
CREATE TABLE analytics.events_partitioned
PARTITION BY DATE(event_timestamp)
CLUSTER BY user_id, event_name
AS
SELECT * FROM analytics.events_raw;

-- Query que aprovecha partición + cluster (mínimo scan)
SELECT
  user_id,
  COUNT(*) AS total_events
FROM analytics.events_partitioned
WHERE DATE(event_timestamp) BETWEEN '2025-01-01' AND '2025-03-31'
  AND event_name = 'purchase'
GROUP BY user_id
ORDER BY total_events DESC
LIMIT 100`}</Code>
        <div className="tip-box text-xs">AWS equivalente: Redshift con SORTKEY/DISTKEY. Azure: Synapse con distribution hash. La diferencia: en BQ no pagas por almacenamiento de particiones — pagas por datos leídos.</div>
      </div>
      <div className="card card-glow">
        <p className="section-title">Costo estimado</p>
        <div className="scroll-x">
          <table className="w-full text-xs" style={{borderCollapse:'separate',borderSpacing:'0 4px'}}>
            <thead><tr>{['Modelo','Costo','Cuándo usarlo'].map(h=><th key={h} className="text-left pb-2 pr-4" style={{color:'var(--muted)'}}>{h}</th>)}</tr></thead>
            <tbody>
              {[['On-demand','$6.25 / TB leído','Equipos pequeños, queries exploratorias'],
                ['Flat-rate','$2,000+/mes por 100 slots','Workloads predecibles, +40TB/mes'],
                ['Free tier','1 TB/mes gratis','Ideal para aprender y proyectos pequeños'],
                ['Storage','$0.02/GB activo, $0.01/GB long-term','Tablas no modificadas en 90 días → long-term automático'],
              ].map(([m,c,u])=>(
                <tr key={m} className="card" style={{display:'table-row'}}>
                  <td className="py-2 pr-4 font-semibold" style={{color:'var(--teal)'}}>{m}</td>
                  <td className="py-2 pr-4 mono">{c}</td>
                  <td className="py-2" style={{color:'var(--muted)'}}>{u}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="error-box text-xs"><span style={{color:'#f87171'}}>Error de costo común:</span> <code>SELECT *</code> en tablas de 500GB = $3.12 por query. Siempre especifica columnas. El particionado puede reducir esto a centavos.</div>
      </div>
    </div>
  );
}

function BQPricing(){
  return(
    <div className="card card-glow space-y-3">
      <p className="section-title">On-demand vs Flat-rate — cuándo cambia el modelo</p>
      <p className="text-sm leading-relaxed" style={{color:'var(--muted)'}}>El punto de inflexión suele ser 40 TB procesados por mes. Por debajo: on-demand. Por encima: flat-rate. Pero hay más variables.</p>
      <Code lang="sql">{`-- Ver bytes procesados por query (antes de ejecutar)
-- En la UI de BQ aparece en la esquina superior derecha

-- Estimar costo de una query sin ejecutarla
-- Usa el flag --dry_run en CLI:
-- bq query --dry_run --use_legacy_sql=false 'SELECT ...'

-- Ver historial de uso (útil para decidir flat-rate)
SELECT
  user_email,
  SUM(total_bytes_processed) / POW(10,12) AS tb_processed,
  COUNT(*) AS query_count,
  DATE(creation_time) AS query_date
FROM \`region-us\`.INFORMATION_SCHEMA.JOBS
WHERE DATE(creation_time) >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
GROUP BY 1, 4
ORDER BY 2 DESC`}</Code>
      <div className="tip-box text-xs"><span style={{color:'var(--teal)'}}>Workload Management:</span> Con flat-rate puedes asignar slots por proyecto o por usuario — evita que un analista junior bloquee las queries de producción.</div>
    </div>
  );
}

function BQML(){
  return(
    <div className="space-y-4">
      <div className="card card-glow">
        <p className="section-title">BigQuery ML — ML sin mover datos</p>
        <p className="text-sm leading-relaxed mb-3" style={{color:'var(--muted)'}}>En lugar de exportar datos a Python para entrenar un modelo, BigQuery ML te deja entrenar con SQL. El modelo vive en BigQuery junto a los datos — sin pipelines de transferencia, sin infra adicional.</p>
        <Code lang="sql">{`-- Modelo de regresión logística para predecir compra
CREATE OR REPLACE MODEL marketing.purchase_propensity
OPTIONS(
  model_type = 'logistic_reg',
  input_label_cols = ['will_purchase'],
  auto_class_weights = TRUE
) AS
SELECT
  user_id,
  session_count,
  avg_session_duration,
  pages_per_session,
  channel_grouping,
  device_category,
  will_purchase  -- label: 0 o 1
FROM marketing.user_features
WHERE date_partition >= '2024-01-01';

-- Evaluar el modelo
SELECT * FROM ML.EVALUATE(MODEL marketing.purchase_propensity);

-- Predecir sobre nuevos usuarios
SELECT user_id, predicted_will_purchase, predicted_will_purchase_probs
FROM ML.PREDICT(MODEL marketing.purchase_propensity,
  (SELECT * FROM marketing.user_features WHERE date_partition = CURRENT_DATE())
);`}</Code>
        <div className="tip-box text-xs"><span style={{color:'var(--teal)'}}>Modelos soportados:</span> Regresión lineal/logística, K-means, Matrix Factorization, XGBoost, DNN, importar modelos TensorFlow/PyTorch, y desde 2024: integración directa con Vertex AI.</div>
      </div>
    </div>
  );
}

function BQMarketing(){
  return(
    <div className="space-y-4">
      <div className="card card-glow">

        <Code lang="sql">{`-- Tablas que genera GA4 en BigQuery
-- analytics_XXXXXXXXX.events_20250115  (por día)
-- analytics_XXXXXXXXX.events_intraday_20250115 (streaming)

-- Query: ingresos por canal + ROAS de Google Ads
SELECT
  traffic_source.medium AS medium,
  traffic_source.source AS source,
  COUNT(DISTINCT user_pseudo_id) AS users,
  SUM((SELECT value.int_value FROM UNNEST(event_params)
       WHERE key = 'value')) AS revenue,
  SUM((SELECT value.int_value FROM UNNEST(event_params)
       WHERE key = 'value')) /
  NULLIF(MAX(ads_cost), 0) AS roas  -- requiere Data Transfer
FROM \`project.analytics_123.events_*\`  -- wildcard para todos los días
WHERE _TABLE_SUFFIX BETWEEN '20250101' AND '20250131'
  AND event_name = 'purchase'
GROUP BY 1, 2
ORDER BY revenue DESC`}</Code>

/* ── BIGQUERY COST CALCULATOR (used in BQ tab and standalone) ── */
function BQCalculator(){
  const [gb,setGb]=useState(100);
  const [queries,setQueries]=useState(500);
  const [partitioned,setPartitioned]=useState(false);
  const [biEngine,setBiEngine]=useState(false);
  const factor=partitioned?0.15:1;
  const tbRead=(gb*factor)/1000;
  const odCost=tbRead*6.25;
  const frCost=2000;
  const biCost=biEngine?(0.05*24*30*2):0;
  const saving=partitioned?Math.round((1-factor)*100):0;
  const recommend=odCost<frCost?'on-demand':'flat-rate';
  return(
    <div className="card card-glow space-y-4">
      <p className="section-title">Simulador de costos BigQuery</p>
      {[
        {label:`GB procesados por mes: ${gb} GB`,val:gb,set:setGb,min:1,max:5000,step:10},
        {label:`Número de queries/mes: ${queries}`,val:queries,set:setQueries,min:1,max:5000,step:50},
      ].map(({label,val,set,min,max,step})=>(
        <div key={label}>
          <p className="text-xs mb-1" style={{color:'var(--muted)'}}>{label}</p>
          <input type="range" min={min} max={max} step={step} value={val} onChange={e=>set(Number(e.target.value))}/>
        </div>
      ))}
      <div className="flex gap-4 flex-wrap text-xs">
        {[['Particionado activo',partitioned,setPartitioned],['BI Engine (2 GB)',biEngine,setBiEngine]].map(([l,v,s])=>(
          <label key={l} className="flex items-center gap-2 cursor-pointer">
            <div onClick={()=>s(!v)} style={{width:32,height:18,borderRadius:9,background:v?'var(--teal)':'var(--border)',position:'relative',cursor:'pointer',transition:'background .2s'}}>
              <div style={{position:'absolute',top:2,left:v?14:2,width:14,height:14,borderRadius:'50%',background:'white',transition:'left .2s'}}/>
            </div>
            <span style={{color:'var(--text)'}}>{l}</span>
          </label>
        ))}
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
        {[
          ['TB leídos',`${tbRead.toFixed(3)} TB`,'var(--muted)'],
          ['On-demand',`$${odCost.toFixed(2)}/mes`,'var(--teal)'],
          ['Flat-rate',`$${(frCost+biCost).toFixed(0)}/mes`,'var(--var)'],
          ['Ahorro particionado',`${saving}%`,'var(--flag)'],
        ].map(([l,v,c])=>(
          <div key={l} className="card" style={{padding:'.75rem'}}>
            <p className="text-xs mb-1" style={{color:'var(--muted)'}}>{l}</p>
            <p className="font-bold mono" style={{color:c}}>{v}</p>
          </div>
        ))}
      </div>
      <div className={cx('tip-box text-xs',recommend==='flat-rate'&&'error-box')}>
        <span style={{color:recommend==='on-demand'?'var(--teal)':'#f87171'}}>Recomendación:</span> Con este volumen, <strong>{recommend==='on-demand'?'On-demand es más económico':'Flat-rate se justifica'}</strong>. {partitioned&&`El particionado reduce los datos leídos en ${saving}%.`} {biEngine&&` BI Engine añade $${biCost.toFixed(0)}/mes pero elimina latencia en dashboards.`}
      </div>
    </div>
  );
}

/* ── QUIZ ── */
const QUIZ_Q=[
  {q:'Un analista ejecuta SELECT * sobre una tabla de 800 GB en BigQuery on-demand. ¿Cuál es el costo aproximado?',opts:['$0.00 (free tier cubre todo)','$5.00','$4.25','Depende del número de filas, no de GB'],ans:2,exp:'On-demand cobra $6.25/TB. 800 GB = 0.8 TB × $6.25 = $5.00. Pero la respuesta "$5.00" asume sin free tier. El free tier da 1 TB/mes gratis. Si ya usó el free tier, es ~$5.00.'},
  {q:'¿Cuál es la diferencia principal entre Cloud Run y Cloud Functions en GCP?',opts:['Cloud Run sólo soporta Python','Cloud Run ejecuta contenedores; Cloud Functions ejecuta funciones individuales','Cloud Functions escala infinitamente; Cloud Run no','Son idénticos, sólo cambia el precio'],ans:1,exp:'Cloud Run despliega contenedores Docker completos (cualquier lenguaje/runtime). Cloud Functions despliega código fuente directamente (FaaS). Cloud Run tiene más flexibilidad; Cloud Functions es más simple de configurar.'},
  {q:'¿Qué hace el particionado por fecha en BigQuery?',opts:['Encripta los datos por período','Divide la tabla en archivos por fecha → las queries con WHERE de fecha leen sólo las particiones necesarias','Replica los datos en múltiples regiones','Comprime los datos automáticamente'],ans:1,exp:'El particionado físicamente separa los datos por fecha. Una query con WHERE DATE = "2025-01-15" sólo lee esa partición, no toda la tabla. Puede reducir costos en 80-95% en tablas de eventos con buenas cláusulas de fecha.'},
  {q:'En la jerarquía de recursos de GCP, ¿dónde se asigna la Billing Account?',opts:['A nivel de Organización','A nivel de Carpeta','A nivel de Proyecto','A nivel de Servicio individual'],ans:2,exp:'La Billing Account se vincula a nivel de Proyecto. Cada proyecto puede tener una sola Billing Account activa. Esto permite tener múltiples proyectos (prod/dev/staging) con diferentes presupuestos o incluso diferentes cuentas de facturación.'},
  {q:'¿Por qué GA4 exporta tablas con el esquema events_YYYYMMDD en BigQuery?',opts:['Por limitaciones técnicas de BigQuery','Para facilitar el particionado: cada día es una tabla, lo que permite consultar rangos de fechas leyendo sólo las tablas necesarias','Por compatibilidad con Universal Analytics','Porque BigQuery no soporta tablas grandes'],ans:1,exp:'El sufijo de fecha actúa como particionado manual. Usando el comodín events_* con _TABLE_SUFFIX BETWEEN, BigQuery sólo lee las tablas (días) del rango solicitado. Esto reduce dramáticamente los costos en análisis histórico.'},
];
function TabQuiz(){
  const [answers,setAnswers]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const score=Object.entries(answers).filter(([i,a])=>QUIZ_Q[i].ans===a).length;
  return(
    <div className="fade-in space-y-4">
      <div className="flex items-center gap-3 mb-2">
        <span className="badge badge-teal">Quiz</span>
        <h2 className="text-xl font-bold">5 preguntas — GCP Analytics</h2>
      </div>
      {QUIZ_Q.map((q,qi)=>(
        <div key={qi} className="card card-glow">
          <p className="text-sm font-semibold mb-3 leading-relaxed">{qi+1}. {q.q}</p>
          <div className="space-y-2">
            {q.opts.map((opt,oi)=>{
              const chosen=answers[qi]===oi;
              const correct=q.ans===oi;
              let cls='quiz-opt';
              if(submitted&&chosen&&correct) cls+=' quiz-correct';
              else if(submitted&&chosen&&!correct) cls+=' quiz-wrong';
              else if(submitted&&correct) cls+=' quiz-correct';
              return(
                <button key={oi} className={cls} onClick={()=>!submitted&&setAnswers(a=>({...a,[qi]:oi}))}>
                  <span className="mono text-xs mr-2" style={{color:'var(--teal)'}}>{String.fromCharCode(65+oi)}.</span>{opt}
                </button>
              );
            })}
          </div>
          {submitted&&<div className="tip-box text-xs mt-3"><span style={{color:'var(--teal)'}}>Explicación:</span> {q.exp}</div>}
        </div>
      ))}
      {!submitted?(
        <button onClick={()=>setSubmitted(true)} disabled={Object.keys(answers).length<5}
          className="w-full py-3 rounded-lg font-semibold text-sm transition-all"
          style={{background:Object.keys(answers).length<5?'var(--border)':'var(--teal)',color:'var(--bg)',cursor:Object.keys(answers).length<5?'not-allowed':'pointer'}}>
          {Object.keys(answers).length<5?`Responde ${5-Object.keys(answers).length} pregunta(s) más`:'Ver resultados'}
        </button>
      ):(
        <div className="card card-glow text-center">
          <p className="text-2xl font-bold mb-1" style={{color:'var(--teal)'}}>{score}/5</p>
          <p className="text-sm" style={{color:'var(--muted)'}}>{score===5?'Perfecto — dominas GCP Analytics':score>=3?'Buen resultado. Revisa las explicaciones de las incorrectas.':'Repasa los tabs de Fundamentos y BigQuery.'}</p>
          <button onClick={()=>{setSubmitted(false);setAnswers({})}} className="badge badge-navy cursor-pointer mt-3">Intentar de nuevo</button>
        </div>
      )}
    </div>
  );
}

    case 'storage':return typeof TabStorage!=='undefined'?<TabStorage/>:<Placeholder label="Storage"/>;
    case 'cases':  return typeof TabCases!=='undefined'?<TabCases/>:<Placeholder label="Casos Reales"/>;
    case 'cheat':  return typeof TabCheat!=='undefined'?<TabCheat/>:<Placeholder label="Cheat Sheet"/>;
    case 'compare':return <CloudComparison/>;
    case 'quiz':   return <TabQuiz/>;
    default: return null;
  }
}
function Placeholder({label}){
  return <div className="flex items-center justify-center h-48 text-sm" style={{color:'var(--muted)'}}>{label} — próximamente</div>;
}

/* ── FOOTER ── */
function Footer(){
  return(
    <footer className="text-center py-6 mt-8 text-xs" style={{color:'var(--muted)',borderTop:'1px solid var(--border)'}}>
      © 2026 Valesca Bravo — Interactive Lab &nbsp;·&nbsp;
      <a href="https://valescabravo.github.io/" className="hover:underline" style={{color:'var(--teal)'}}>Portfolio</a>
    </footer>
  );
}

/* ── APP ── */
function App(){
  const [tab,setTab]=useState('fund');
  return(
    <div className="min-h-screen">
      <Hero/>
      <TabNav active={tab} onSelect={setTab}/>
      <main className="max-w-5xl mx-auto px-4 py-8 fade-in" key={tab}>
        <TabContent active={tab}/>
      </main>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
