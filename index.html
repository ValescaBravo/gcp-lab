const {useState,useRef} = React;

/* ── helpers ── */
const cx=(...c)=>c.filter(Boolean).join(' ');

/* ── syntax highlight ── */
function Code({lang='sql',children}){
  let html=children.trim();
  if(lang==='sql'){
    html=html
      .replace(/--[^\n]*/g,m=>`<span class="cmt">${m}</span>`)
      .replace(/\b(SELECT|FROM|WHERE|GROUP BY|ORDER BY|LIMIT|WITH|AS|ON|JOIN|LEFT|INNER|HAVING|PARTITION BY|CLUSTER BY|CREATE|TABLE|REPLACE|INSERT|UPDATE|DELETE|UNNEST|STRUCT|ARRAY|IF|THEN|ELSE|END|CASE|WHEN|AND|OR|NOT|IN|IS|NULL|TRUE|FALSE|BY|OVER|BETWEEN)\b/g,m=>`<span class="kw">${m}</span>`)
      .replace(/'([^']*)'/g,(_,v)=>`<span class="str">'${v}'</span>`)
      .replace(/\b(\d+(\.\d+)?)\b/g,m=>`<span class="num">${m}</span>`);
  }else if(lang==='gcloud'){
    html=html
      .replace(/#[^\n]*/g,m=>`<span class="cmt">${m}</span>`)
      .replace(/(--[\w-]+=?)/g,m=>`<span class="flag">${m}</span>`)
      .replace(/\b(gcloud|bq|gsutil)\b/g,m=>`<span class="kw">${m}</span>`)
      .replace(/'([^']*)'/g,(_,v)=>`<span class="str">'${v}'</span>`);
  }
  return <pre className="code-block"><code dangerouslySetInnerHTML={{__html:html}}/></pre>;
}

/* ── TABS config ── */

  {id:'bq',    label:'BigQuery'},

/* ── TAB: GCP FUNDAMENTALS ── */
function TabFund(){
  const [open,setOpen]=useState(null);
  const toggle=k=>setOpen(o=>o===k?null:k);
  const sections=[
    {key:'hier',title:'Resource hierarchy',badge:'Resource Model',
     analogy:'Think of Google Cloud as a real company: the Organisation is the company, Folders are departments (Marketing, Engineering), and Projects are the teams. Each team has its own budget (Billing Account).',
     detail:<>
      <p className="text-sm leading-relaxed mb-3" style={{color:'var(--muted)'}}>The hierarchy defines how permissions are inherited downwards: a role assigned at Organisation level is inherited by all Folders and Projects.</p>
      <Code lang="gcloud">{`# List available projects
gcloud projects list

# Create project under a folder
gcloud projects create my-analytics-proj \\
  --folder=123456789 \\
  --set-as-default

# View organisation hierarchy
gcloud resource-manager folders list \\
  --organization=ORG_ID`}</Code>
      <div className="tip-box text-xs mt-2"><span style={{color:'var(--teal)'}}>Real-world case:</span> Separating <code>ga4-production</code> from <code>ga4-dev</code> prevents an expensive query in testing from affecting the production budget.</div>
      <div className="error-box text-xs"><span style={{color:'#f87171'}}>Common mistake:</span> Putting everything in one project mixes costs, permissions, and environments. In production, minimum 3 projects: dev / staging / prod.</div>
     </>
    },
    {key:'iam',title:'IAM: identities and roles',badge:'Security',
     analogy:'IAM is the building doorman. It defines who can enter (identity), which floor (resource), and what they can do there (role). Predefined roles are master keys — convenient, but dangerous if they fall into the wrong hands.',
     detail:<>
      <p className="text-sm leading-relaxed mb-3" style={{color:'var(--muted)'}}>AWS equivalent: IAM Roles + Policies. Azure: RBAC. GCP uses an additive model: permissions are accumulated, never subtracted.</p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
        {[['User Account','Real person with Google email. For interactive human access.','badge-navy'],
          ['Service Account','Identity for apps and services. Has JSON key or Workload Identity.','badge-teal'],
          ['Group','Collection of users. Best practice: assign roles to groups, not individuals.','badge-orange'],
          ['Custom Role','Exact combination of permissions. Mandatory in production.','badge-navy']
        ].map(([t,d,b])=>(
          <div key={t} className="card" style={{padding:'.75rem'}}>
            <span className={cx('badge',b,'mb-2')}>{t}</span>
            <p className="text-xs mt-1" style={{color:'var(--muted)'}}>{d}</p>
          </div>
        ))}
      </div>
      <Code lang="gcloud">{`# Assign role to Service Account (principle of least privilege)
gcloud projects add-iam-policy-binding my-proj \\
  --member='serviceAccount:sa@my-proj.iam.gserviceaccount.com' \\
  --role='roles/bigquery.dataViewer'

# NEVER in prod: roles/owner or roles/editor
# View current roles
gcloud projects get-iam-policy my-proj --format=json`}</Code>
      <div className="error-box text-xs"><span style={{color:'#f87171'}}>Common mistake:</span> Using <code>roles/editor</code> in production gives write access to all services. A badly written script could delete BigQuery tables or expose data.</div>
     </>
    },
    {key:'billing',title:'Billing Accounts and budgets',badge:'Costs',
     analogy:'The Billing Account is your company\'s credit card in GCP. A project without an active Billing Account cannot use paid services — like trying to call without credit.',
     detail:<>
      <Code lang="gcloud">{`# List billing accounts
gcloud billing accounts list

# Link project to billing account
gcloud billing projects link my-proj \\
  --billing-account=0X0X0X-0X0X0X-0X0X0X

# Create budget alert (better via Console)
# Budget API also available via REST`}</Code>
      <div className="tip-box text-xs"><span style={{color:'var(--teal)'}}>Recommended practice:</span> Set up alerts at 50%, 90%, and 100% of the monthly budget. GCP does not automatically cut services when the limit is reached — costs continue to grow.</div>
     </>
    },
  ];
  return(
    <div className="space-y-4 fade-in">
      <div className="flex items-center gap-3 mb-6">
        <span className="badge badge-teal">Fundamentals</span>
        <h2 className="text-xl font-bold">Google Cloud Platform — Conceptual Foundation</h2>
      </div>
      <div className="card card-glow mb-6">
        <p className="text-sm leading-relaxed" style={{color:'var(--muted)'}}>GCP organises everything in a resource hierarchy. Unlike AWS (where everything revolves around accounts) or Azure (subscriptions), GCP uses <strong style={{color:'var(--text)'}}>Projects</strong> as the central unit of billing, permissions, and services.</p>
        <div className="mt-3 grid grid-cols-3 text-center gap-2 text-xs">
          {[['GCP','Project','Billing Account'],['AWS','Account','AWS Account'],['Azure','Resource Group','Subscription']].map(([c,u,b])=>(
            <div key={c} className="card" style={{padding:'.6rem'}}>
              <div className="font-bold mb-1" style={{color:'var(--teal)'}}>{c}</div>
              <div style={{color:'var(--muted)'}}>{u}<br/><span className="mono text-xs">{b}</span></div>
            </div>
          ))}
        </div>
      </div>
      {sections.map(s=>(
        <div key={s.key} className="card card-glow">
          <button className="w-full flex items-center justify-between gap-2" onClick={()=>toggle(s.key)}>
            <div className="flex items-center gap-2"><span className="badge badge-teal">{s.badge}</span><span className="font-semibold text-sm">{s.title}</span></div>
            <span style={{color:'var(--teal)'}}>{open===s.key?'▲':'▼'}</span>
          </button>
          <p className="text-sm mt-3 leading-relaxed" style={{color:'var(--muted)'}}>{s.analogy}</p>
          {open===s.key&&<div className="mt-4 fade-in">{s.detail}</div>}
        </div>
      ))}

  );
}

function BQArch(){
  return(
    <div className="space-y-4">
      <div className="card card-glow">
        <p className="section-title">Why is BigQuery fast?</p>
        <p className="text-sm leading-relaxed mb-3" style={{color:'var(--muted)'}}>Analogy: imagine a filing cabinet. A traditional database stores each complete card (row). BigQuery stores all cards of "colour" together, all cards of "price" together — separate columns. When you ask "what is the average price?", it only reads the price column, not the entire file.</p>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
          {[
            ['Columnar','Reads only the columns needed. A query touching 2 of 50 columns reads 4% of the data.','var(--teal)'],
            ['Dremel Engine','Distributed execution engine: splits the query across thousands of workers in parallel. No configuration on your part.','var(--var)'],
            ['Storage/compute separation','Data lives in Colossus (storage), processing happens in Borg (compute). They scale independently.','var(--flag)'],
          ].map(([t,d,c])=>(
            <div key={t} className="card" style={{borderColor:`${c}40`,padding:'.85rem'}}>
              <div className="font-bold mb-1" style={{color:c}}>{t}</div>
              <p style={{color:'var(--muted)'}}>{d}</p>
            </div>
          ))}
        </div>
      </div>
      <div className="card card-glow">
        <p className="section-title">Partitioning and Clustering</p>
        <p className="text-sm leading-relaxed mb-2" style={{color:'var(--muted)'}}>Partitioning = split the table by date. Clustering = sort rows within each partition by columns frequently used in WHERE. Together they can reduce data read by 90%+.</p>
        <Code lang="sql">{`-- Table partitioned by day with clustering
CREATE TABLE analytics.events_partitioned
PARTITION BY DATE(event_timestamp)
CLUSTER BY user_id, event_name
AS
SELECT * FROM analytics.events_raw;

-- Query that leverages partition + cluster (minimum scan)
SELECT
  user_id,
  COUNT(*) AS total_events
FROM analytics.events_partitioned
WHERE DATE(event_timestamp) BETWEEN '2025-01-01' AND '2025-03-31'
  AND event_name = 'purchase'
GROUP BY user_id
ORDER BY total_events DESC
LIMIT 100`}</Code>
        <div className="tip-box text-xs">AWS equivalent: Redshift with SORTKEY/DISTKEY. Azure: Synapse with distribution hash. The difference: in BQ you don't pay for partition storage — you pay for data read.</div>
      </div>
      <div className="card card-glow">
        <p className="section-title">Estimated cost</p>
        <div className="scroll-x">
          <table className="w-full text-xs" style={{borderCollapse:'separate',borderSpacing:'0 4px'}}>
            <thead><tr>{['Model','Cost','When to use'].map(h=><th key={h} className="text-left pb-2 pr-4" style={{color:'var(--muted)'}}>{h}</th>)}</tr></thead>
            <tbody>
              {[['On-demand','$6.25 / TB read','Small teams, exploratory queries'],
                ['Flat-rate','$2,000+/mo for 100 slots','Predictable workloads, +40TB/mo'],
                ['Free tier','1 TB/mo free','Ideal for learning and small projects'],
                ['Storage','$0.02/GB active, $0.01/GB long-term','Tables not modified in 90 days → automatic long-term'],
              ].map(([m,c,u])=>(
                <tr key={m} className="card" style={{display:'table-row'}}>
                  <td className="py-2 pr-4 font-semibold" style={{color:'var(--teal)'}}>{m}</td>
                  <td className="py-2 pr-4 mono">{c}</td>
                  <td className="py-2" style={{color:'var(--muted)'}}>{u}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="error-box text-xs"><span style={{color:'#f87171'}}>Common cost mistake:</span> <code>SELECT *</code> on a 500GB table = $3.12 per query. Always specify columns. Partitioning can reduce this to cents.</div>
      </div>
    </div>
  );
}

function BQPricing(){
  return(
    <div className="card card-glow space-y-3">
      <p className="section-title">On-demand vs Flat-rate — when to switch</p>
      <p className="text-sm leading-relaxed" style={{color:'var(--muted)'}}>The inflection point is usually around 40 TB processed per month. Below that: on-demand. Above that: flat-rate. But there are more variables.</p>
      <Code lang="sql">{`-- View bytes processed by query (before executing)
-- In the BQ UI it appears in the top-right corner

-- Estimate cost of a query without running it
-- Use the --dry_run flag in CLI:
-- bq query --dry_run --use_legacy_sql=false 'SELECT ...'

-- View usage history (useful for deciding flat-rate)
SELECT
  user_email,
  SUM(total_bytes_processed) / POW(10,12) AS tb_processed,
  COUNT(*) AS query_count,
  DATE(creation_time) AS query_date
FROM \`region-us\`.INFORMATION_SCHEMA.JOBS
WHERE DATE(creation_time) >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
GROUP BY 1, 4
ORDER BY 2 DESC`}</Code>
      <div className="tip-box text-xs"><span style={{color:'var(--teal)'}}>Workload Management:</span> With flat-rate you can assign slots by project or by user — prevents a junior analyst from blocking production queries.</div>
    </div>
  );
}

function BQML(){
  return(
    <div className="space-y-4">
      <div className="card card-glow">
        <p className="section-title">BigQuery ML — ML without moving data</p>
        <p className="text-sm leading-relaxed mb-3" style={{color:'var(--muted)'}}>Instead of exporting data to Python to train a model, BigQuery ML lets you train with SQL. The model lives in BigQuery alongside the data — no transfer pipelines, no additional infrastructure.</p>
        <Code lang="sql">{`-- Logistic regression model to predict purchase
CREATE OR REPLACE MODEL marketing.purchase_propensity
OPTIONS(
  model_type = 'logistic_reg',
  input_label_cols = ['will_purchase'],
  auto_class_weights = TRUE
) AS
SELECT
  user_id,
  session_count,
  avg_session_duration,
  pages_per_session,
  channel_grouping,
  device_category,
  will_purchase  -- label: 0 or 1
FROM marketing.user_features
WHERE date_partition >= '2024-01-01';

-- Evaluate the model
SELECT * FROM ML.EVALUATE(MODEL marketing.purchase_propensity);

-- Predict on new users
SELECT user_id, predicted_will_purchase, predicted_will_purchase_probs
FROM ML.PREDICT(MODEL marketing.purchase_propensity,
  (SELECT * FROM marketing.user_features WHERE date_partition = CURRENT_DATE())
);`}</Code>
        <div className="tip-box text-xs"><span style={{color:'var(--teal)'}}>Supported models:</span> Linear/logistic regression, K-means, Matrix Factorization, XGBoost, DNN, import TensorFlow/PyTorch models, and since 2024: direct integration with Vertex AI.</div>
      </div>
    </div>
  );
}

function BQMarketing(){

    {title:'GA4 → BigQuery → Looker Studio',tag:'Marketing Analytics',
     desc:'End-to-end pipeline for a marketing team needing user behaviour analysis and channel attribution.',
     steps:['GA4 enables daily export to BigQuery (free in GA4 360, also available in standard property)','events_YYYYMMDD table with all user events','SQL queries in BigQuery for business metrics','Looker Studio connects directly to BigQuery (native connector)','BI Engine active for <100ms response on executive dashboard'],
     code:`-- Conversion funnel by channel
WITH sessions AS (
  SELECT
    user_pseudo_id,
    (SELECT value.string_value FROM UNNEST(event_params)
     WHERE key = 'session_id') AS session_id,
    traffic_source.medium AS medium,
    MAX(IF(event_name='page_view',1,0)) AS saw_product,
    MAX(IF(event_name='add_to_cart',1,0)) AS added_cart,
    MAX(IF(event_name='purchase',1,0)) AS purchased
  FROM \`project.analytics_123.events_*\`
  WHERE _TABLE_SUFFIX >= FORMAT_DATE('%Y%m%d', DATE_SUB(CURRENT_DATE(),INTERVAL 30 DAY))
  GROUP BY 1,2,3
)
SELECT
  medium,
  COUNT(*) AS sessions,
  ROUND(AVG(saw_product)*100,1) AS pct_product_view,
  ROUND(AVG(added_cart)*100,1) AS pct_add_to_cart,
  ROUND(AVG(purchased)*100,1) AS pct_purchase,
  ROUND(SAFE_DIVIDE(SUM(purchased),SUM(added_cart))*100,1) AS cart_to_purchase
FROM sessions
GROUP BY medium
ORDER BY sessions DESC`},
    {title:'Google Ads analysis with BigQuery',tag:'Paid Media',
     desc:'Data Transfer Service loads Google Ads data into BigQuery automatically. Allows combining campaign costs with GA4 conversions.',
     steps:['Enable BigQuery Data Transfer Service for Google Ads','p_Campaign_, p_AdGroup_, p_ClickStats_ tables generated daily','JOIN with GA4 tables to calculate true ROAS (not platform ROAS)','Detect campaigns with high spend and low revenue'],
     code:`-- True ROAS: cross Ads spend with GA4 revenue
SELECT
  c.campaign_name,
  SUM(cs.cost_micros) / 1e6 AS spend,
  SUM(e.revenue) AS ga4_revenue,
  ROUND(SAFE_DIVIDE(SUM(e.revenue), SUM(cs.cost_micros)/1e6),2) AS true_roas
FROM \`project.ads_data.p_Campaign_123\` c
JOIN \`project.ads_data.p_ClickStats_123\` cs
  ON c.campaign_id = cs.campaign_id
LEFT JOIN (
  SELECT
    (SELECT value.string_value FROM UNNEST(event_params) WHERE key='gclid') AS gclid,
    SUM((SELECT value.int_value FROM UNNEST(event_params) WHERE key='value')) AS revenue
  FROM \`project.analytics_123.events_*\`
  WHERE event_name='purchase' AND _TABLE_SUFFIX >= '20250101'
  GROUP BY 1
) e ON cs.click_id = e.gclid
GROUP BY 1
ORDER BY spend DESC`},
    {title:'Purchase propensity with Vertex AI',tag:'Applied ML',
     desc:'Predict which users are most likely to purchase in the next 7 days to optimise remarketing campaigns.',
     steps:['Feature engineering in BigQuery: session history, products viewed, recency','Export features to Vertex AI Feature Store','Train XGBoost model in Vertex AI Training','Daily batch predictions on active users','Export scores to BigQuery → segment in Google Ads (custom audience)'],
     code:`-- Feature engineering for purchase propensity
SELECT
  user_pseudo_id,
  COUNT(DISTINCT DATE(event_timestamp)) AS active_days_30d,
  COUNT(*) AS total_events,
  SUM(IF(event_name='view_item',1,0)) AS product_views,
  SUM(IF(event_name='add_to_cart',1,0)) AS cart_adds,
  MAX(IF(event_name='purchase',1,0)) AS has_purchased,
  DATE_DIFF(CURRENT_DATE(),
    DATE(MAX(event_timestamp)), DAY) AS days_since_last_session,
  -- label: did they purchase in the 7 days following the cut-off?
  MAX(IF(event_name='purchase'
    AND DATE(event_timestamp) BETWEEN DATE_ADD(CURRENT_DATE(),INTERVAL 1 DAY)
    AND DATE_ADD(CURRENT_DATE(),INTERVAL 7 DAY),1,0)) AS will_buy_7d
FROM \`project.analytics_123.events_*\`
WHERE _TABLE_SUFFIX >= FORMAT_DATE('%Y%m%d',DATE_SUB(CURRENT_DATE(),INTERVAL 60 DAY))
GROUP BY user_pseudo_id`},
  ];
  const c=cases[active];
  return(
    <div className="fade-in space-y-4">
      <div className="flex items-center gap-3 mb-2">
        <span className="badge badge-teal">Real Cases</span>
        <h2 className="text-xl font-bold">Production architectures</h2>
      </div>
      <div className="flex gap-2 flex-wrap">
        {cases.map((cs,i)=>(
          <button key={i} onClick={()=>setActive(i)} className={cx('badge cursor-pointer',active===i?'badge-teal':'badge-navy')}>{cs.tag}</button>
        ))}
      </div>
      <div className="card card-glow fade-in" key={active}>
        <div className="flex items-center gap-2 mb-3"><span className="badge badge-teal">{c.tag}</span><h3 className="font-bold">{c.title}</h3></div>
        <p className="text-sm leading-relaxed mb-4" style={{color:'var(--muted)'}}>{c.desc}</p>
        <div className="mb-4">
          {c.steps.map((s,i)=>(
            <div key={i} className="flex gap-3 mb-2">
              <span className="mono text-xs mt-0.5 shrink-0" style={{color:'var(--teal)'}}>{String(i+1).padStart(2,'0')}</span>
              <p className="text-xs leading-relaxed" style={{color:'var(--text)'}}>{s}</p>
            </div>
          ))}
        </div>
        <Code lang="sql">{c.code}</Code>
      </div>
    </div>
  );
}

/* ── BIGQUERY COST CALCULATOR (used in BQ tab and standalone) ── */
function BQCalculator(){
  const [gb,setGb]=useState(100);
  const [queries,setQueries]=useState(500);
  const [partitioned,setPartitioned]=useState(false);
  const [biEngine,setBiEngine]=useState(false);
  const factor=partitioned?0.15:1;
  const tbRead=(gb*factor)/1000;
  const odCost=tbRead*6.25;
  const frCost=2000;
  const biCost=biEngine?(0.05*24*30*2):0;
  const saving=partitioned?Math.round((1-factor)*100):0;
  const recommend=odCost<frCost?'on-demand':'flat-rate';
  return(
    <div className="card card-glow space-y-4">
      <p className="section-title">BigQuery Cost Simulator</p>
      {[
        {label:`GB processed per month: ${gb} GB`,val:gb,set:setGb,min:1,max:5000,step:10},
        {label:`Number of queries/month: ${queries}`,val:queries,set:setQueries,min:1,max:5000,step:50},
      ].map(({label,val,set,min,max,step})=>(
        <div key={label}>
          <p className="text-xs mb-1" style={{color:'var(--muted)'}}>{label}</p>
          <input type="range" min={min} max={max} step={step} value={val} onChange={e=>set(Number(e.target.value))}/>
        </div>
      ))}
      <div className="flex gap-4 flex-wrap text-xs">
        {[['Partitioning active',partitioned,setPartitioned],['BI Engine (2 GB)',biEngine,setBiEngine]].map(([l,v,s])=>(
          <label key={l} className="flex items-center gap-2 cursor-pointer">
            <div onClick={()=>s(!v)} style={{width:32,height:18,borderRadius:9,background:v?'var(--teal)':'var(--border)',position:'relative',cursor:'pointer',transition:'background .2s'}}>
              <div style={{position:'absolute',top:2,left:v?14:2,width:14,height:14,borderRadius:'50%',background:'white',transition:'left .2s'}}/>
            </div>
            <span style={{color:'var(--text)'}}>{l}</span>
          </label>
        ))}
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
        {[
          ['TB read',`${tbRead.toFixed(3)} TB`,'var(--muted)'],
          ['On-demand',`$${odCost.toFixed(2)}/mo`,'var(--teal)'],
          ['Flat-rate',`$${(frCost+biCost).toFixed(0)}/mo`,'var(--var)'],
          ['Partition saving',`${saving}%`,'var(--flag)'],
        ].map(([l,v,c])=>(
          <div key={l} className="card" style={{padding:'.75rem'}}>
            <p className="text-xs mb-1" style={{color:'var(--muted)'}}>{l}</p>
            <p className="font-bold mono" style={{color:c}}>{v}</p>
          </div>
        ))}
      </div>
      <div className={cx('tip-box text-xs',recommend==='flat-rate'&&'error-box')}>
        <span style={{color:recommend==='on-demand'?'var(--teal)':'#f87171'}}>Recommendation:</span> With this volume, <strong>{recommend==='on-demand'?'On-demand is more cost-effective':'Flat-rate is justified'}</strong>. {partitioned&&`Partitioning reduces data read by ${saving}%.`} {biEngine&&` BI Engine adds $${biCost.toFixed(0)}/mo but eliminates dashboard latency.`}
      </div>
    </div>
  );
}

/* ── QUIZ ── */
const QUIZ_Q=[
  {q:'An analyst runs SELECT * on an 800 GB table in BigQuery on-demand. What is the approximate cost?',opts:['$0.00 (free tier covers everything)','$5.00','$4.25','Depends on number of rows, not GB'],ans:2,exp:'On-demand charges $6.25/TB. 800 GB = 0.8 TB × $6.25 = $5.00. The answer "$5.00" assumes no free tier. The free tier gives 1 TB/mo free. If the free tier is already used, it\'s ~$5.00.'},
  {q:'What is the main difference between Cloud Run and Cloud Functions in GCP?',opts:['Cloud Run only supports Python','Cloud Run runs containers; Cloud Functions runs individual functions','Cloud Functions scales infinitely; Cloud Run does not','They are identical, only pricing differs'],ans:1,exp:'Cloud Run deploys complete Docker containers (any language/runtime). Cloud Functions deploys source code directly (FaaS). Cloud Run offers more flexibility; Cloud Functions is simpler to configure.'},
  {q:'What does date partitioning do in BigQuery?',opts:['Encrypts data by period','Splits the table into files by date → queries with date WHERE clauses read only the necessary partitions','Replicates data across multiple regions','Automatically compresses the data'],ans:1,exp:'Partitioning physically separates data by date. A query with WHERE DATE = "2025-01-15" only reads that partition, not the entire table. Can reduce costs by 80-95% on event tables with good date clauses.'},
  {q:'In the GCP resource hierarchy, where is the Billing Account assigned?',opts:['At Organisation level','At Folder level','At Project level','At individual service level'],ans:2,exp:'The Billing Account is linked at the Project level. Each project can have one active Billing Account. This allows multiple projects (prod/dev/staging) with different budgets or even different billing accounts.'},
  {q:'Why does GA4 export tables with the events_YYYYMMDD schema in BigQuery?',opts:['Due to BigQuery technical limitations','To facilitate partitioning: each day is a table, allowing date range queries to read only the necessary tables','For Universal Analytics compatibility','Because BigQuery doesn\'t support large tables'],ans:1,exp:'The date suffix acts as manual partitioning. Using the events_* wildcard with _TABLE_SUFFIX BETWEEN, BigQuery only reads the tables (days) in the requested range. This dramatically reduces costs in historical analysis.'},
];
function TabQuiz(){
  const [answers,setAnswers]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const score=Object.entries(answers).filter(([i,a])=>QUIZ_Q[i].ans===a).length;
  return(
    <div className="fade-in space-y-4">
      <div className="flex items-center gap-3 mb-2">
        <span className="badge badge-teal">Quiz</span>
        <h2 className="text-xl font-bold">5 questions — GCP Analytics</h2>
      </div>
      {QUIZ_Q.map((q,qi)=>(
        <div key={qi} className="card card-glow">
          <p className="text-sm font-semibold mb-3 leading-relaxed">{qi+1}. {q.q}</p>
          <div className="space-y-2">
            {q.opts.map((opt,oi)=>{
              const chosen=answers[qi]===oi;
              const correct=q.ans===oi;
              let cls='quiz-opt';
              if(submitted&&chosen&&correct) cls+=' quiz-correct';
              else if(submitted&&chosen&&!correct) cls+=' quiz-wrong';
              else if(submitted&&correct) cls+=' quiz-correct';
              return(
                <button key={oi} className={cls} onClick={()=>!submitted&&setAnswers(a=>({...a,[qi]:oi}))}>
                  <span className="mono text-xs mr-2" style={{color:'var(--teal)'}}>{String.fromCharCode(65+oi)}.</span>{opt}
                </button>
              );
            })}
          </div>
          {submitted&&<div className="tip-box text-xs mt-3"><span style={{color:'var(--teal)'}}>Explanation:</span> {q.exp}</div>}
        </div>
      ))}
      {!submitted?(
        <button onClick={()=>setSubmitted(true)} disabled={Object.keys(answers).length<5}
          className="w-full py-3 rounded-lg font-semibold text-sm transition-all"
          style={{background:Object.keys(answers).length<5?'var(--border)':'var(--teal)',color:'var(--bg)',cursor:Object.keys(answers).length<5?'not-allowed':'pointer'}}>
          {Object.keys(answers).length<5?`Answer ${5-Object.keys(answers).length} more question(s)`:'See results'}
        </button>
      ):(
        <div className="card card-glow text-center">
          <p className="text-2xl font-bold mb-1" style={{color:'var(--teal)'}}>{score}/5</p>
          <p className="text-sm" style={{color:'var(--muted)'}}>{score===5?'Perfect — you\'ve mastered GCP Analytics':score>=3?'Good result. Review the explanations for incorrect answers.':'Review the Fundamentals and BigQuery tabs.'}</p>
          <button onClick={()=>{setSubmitted(false);setAnswers({})}} className="badge badge-navy cursor-pointer mt-3">Try again</button>
        </div>
      )}
    </div>
  );
}
